<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="#0f0f0f"/>

  <!-- Clapperboard body -->
  <rect x="8" y="22" width="48" height="34" rx="4" fill="#1e1e2e"/>
  <rect x="8" y="22" width="48" height="34" rx="4" stroke="#7c3aed" stroke-width="2"/>

  <!-- Clapper stick (top bar) -->
  <rect x="8" y="13" width="48" height="11" rx="3" fill="#2d2d3e" stroke="#7c3aed" stroke-width="2"/>

  <!-- Diagonal stripes on clapper stick -->
  <clipPath id="stick-clip">
    <rect x="8" y="13" width="48" height="11" rx="3"/>
  </clipPath>
  <g clip-path="url(#stick-clip)">
    <line x1="14" y1="13" x2="8"  y2="24" stroke="#e2e8f0" stroke-width="5"/>
    <line x1="22" y1="13" x2="16" y2="24" stroke="#0f0f0f"  stroke-width="5"/>
    <line x1="30" y1="13" x2="24" y2="24" stroke="#e2e8f0" stroke-width="5"/>
    <line x1="38" y1="13" x2="32" y2="24" stroke="#0f0f0f"  stroke-width="5"/>
    <line x1="46" y1="13" x2="40" y2="24" stroke="#e2e8f0" stroke-width="5"/>
    <line x1="54" y1="13" x2="48" y2="24" stroke="#0f0f0f"  stroke-width="5"/>
    <line x1="62" y1="13" x2="56" y2="24" stroke="#e2e8f0" stroke-width="5"/>
  </g>

  <!-- Film reel holes on body -->
  <circle cx="20" cy="39" r="6" fill="#0f0f0f" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="20" cy="39" r="2.5" fill="#7c3aed"/>
  <circle cx="44" cy="39" r="6" fill="#0f0f0f" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="44" cy="39" r="2.5" fill="#7c3aed"/>
  <!-- Connecting strip between reels -->
  <rect x="26" y="37" width="12" height="4" rx="2" fill="#7c3aed" opacity="0.4"/>
</svg>
